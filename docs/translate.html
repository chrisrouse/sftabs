---
layout: default
title: Contribute Translations
permalink: /translate
---

<style>
  .translate-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
  }

  .translate-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .translate-header h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .translate-header .lead {
    font-size: 1.1rem;
    color: #666;
    margin-bottom: 1.5rem;
  }

  /* Language Selector */
  .language-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .language-btn {
    padding: 0.75rem;
    border: 2px solid #ddd;
    border-radius: 6px;
    background: #f8f9fa;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
    font-size: 0.95rem;
  }

  .language-btn:hover {
    border-color: #0d6efd;
    background: #e7f1ff;
  }

  .language-btn.active {
    background: #0d6efd;
    color: white;
    border-color: #0d6efd;
  }

  .language-btn .count {
    display: block;
    font-size: 0.8rem;
    font-weight: 400;
    opacity: 0.8;
    margin-top: 0.25rem;
  }

  /* Progress Bar */
  .progress-section {
    margin-bottom: 1.5rem;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }

  .progress-bar-wrapper {
    width: 100%;
    height: 24px;
    background: #e9ecef;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #28a745, #20c997);
    transition: width 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 0.75rem;
    min-width: 40px;
  }

  /* Translations Table */
  .translations-wrapper {
    border: 1px solid #dee2e6;
    border-radius: 8px;
    overflow: hidden;
  }

  .section-header {
    background: #f8f9fa;
    border-bottom: 1px solid #dee2e6;
    padding: 1rem;
    font-weight: 600;
    color: #333;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-header:hover {
    background: #e9ecef;
  }

  .section-header .toggle {
    display: inline-block;
    width: 20px;
    text-align: center;
    color: #666;
  }

  .section-header.collapsed .toggle::before {
    content: '▶ ';
  }

  .section-header .toggle::before {
    content: '▼ ';
  }

  .section-items {
    display: none;
  }

  .section-items.show {
    display: block;
  }

  .translation-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    padding: 1rem;
    border-bottom: 1px solid #dee2e6;
    align-items: start;
  }

  .translation-row:last-child {
    border-bottom: none;
  }

  .translation-row:hover {
    background: #f8f9fa;
  }

  .phrase-column {
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .phrase-text {
    font-weight: 500;
    color: #333;
    margin-bottom: 0.25rem;
    word-break: break-word;
  }

  .phrase-key {
    font-size: 0.75rem;
    color: #999;
    font-family: monospace;
  }

  .context-column {
    font-size: 0.85rem;
  }

  .context-location {
    font-weight: 600;
    color: #333;
    margin-bottom: 0.5rem;
    display: block;
  }

  .context-description {
    color: #666;
    line-height: 1.4;
  }

  .translation-input {
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.5rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    width: 100%;
    box-sizing: border-box;
  }

  .translation-input:focus {
    outline: none;
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
  }

  .translation-input.completed {
    border-color: #28a745;
    background: #f0fdf4;
  }

  /* Status Messages */
  .alert {
    padding: 1rem;
    border-radius: 6px;
    margin-bottom: 1.5rem;
    display: none;
  }

  .alert.show {
    display: block;
  }

  .alert-info {
    background: #e7f1ff;
    border-left: 4px solid #0d6efd;
    color: #084298;
  }

  .alert-success {
    background: #d1e7dd;
    border-left: 4px solid #198754;
    color: #0f5132;
  }

  .alert-error {
    background: #f8d7da;
    border-left: 4px solid #dc3545;
    color: #842029;
  }

  /* Submit Section */
  .submit-section {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid #dee2e6;
  }

  .submit-btn {
    flex: 1;
    padding: 1rem;
    font-size: 0.95rem;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .submit-btn-primary {
    background: #28a745;
    color: white;
  }

  .submit-btn-primary:hover:not(:disabled) {
    background: #218838;
  }

  .submit-btn-secondary {
    background: #0d6efd;
    color: white;
  }

  .submit-btn-secondary:hover:not(:disabled) {
    background: #0b5ed7;
  }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: #666;
  }

  .empty-state i {
    font-size: 3rem;
    color: #ddd;
    display: block;
    margin-bottom: 1rem;
  }

  @media (max-width: 1024px) {
    .translation-row {
      grid-template-columns: 1fr;
      gap: 0.5rem;
    }

    .context-location::before {
      content: 'Location: ';
      font-weight: 600;
    }

    .context-description::before {
      content: 'Context: ';
      font-weight: 600;
    }
  }
</style>

<div class="translate-container">
  <!-- Header -->
  <div class="translate-header">
    <h1>Contribute Translations</h1>
    <p class="lead">Help translate SF Tabs into your language</p>
  </div>

  <!-- Status Messages -->
  <div id="alert-info" class="alert alert-info"></div>
  <div id="alert-success" class="alert alert-success"></div>
  <div id="alert-error" class="alert alert-error"></div>

  <!-- Language Selector -->
  <div id="language-selector" class="language-selector"></div>

  <!-- Progress Bar -->
  <div class="progress-section">
    <div class="progress-info">
      <span><strong id="translated-count">0</strong> of <strong id="total-count">0</strong> translated</span>
      <span id="progress-percent">0%</span>
    </div>
    <div class="progress-bar-wrapper">
      <div id="progress-bar" class="progress-bar-fill" style="width: 0%"></div>
    </div>
  </div>

  <!-- Translations List -->
  <div id="translations-content" class="translations-wrapper"></div>

  <!-- Submit Section -->
  <div class="submit-section">
    <button id="submit-github" class="submit-btn submit-btn-primary">
      🔗 Create Pull Request
    </button>
    <button id="submit-anonymous" class="submit-btn submit-btn-secondary">
      📧 Submit via Issue
    </button>
  </div>
</div>

<script>
  const TranslationApp = {
    state: {
      allStrings: [],
      currentLanguage: null,
      pendingTranslations: {},
      sections: {},
    },

    config: {
      translationJsonUrl: '/sftabs/translations/master.json',
      draftStorageKey: 'sf-tabs-translation-draft',
    },

    languages: {
      es: 'Spanish',
      fr: 'French',
      de: 'German',
      ja: 'Japanese',
    },

    async init() {
      this.loadDraft();
      await this.loadTranslations();
      this.renderLanguageSelector();
      this.attachEventListeners();

      if (this.state.currentLanguage) {
        this.selectLanguage(this.state.currentLanguage);
      }
    },

    async loadTranslations() {
      try {
        const response = await fetch(this.config.translationJsonUrl);
        if (!response.ok) throw new Error('Failed to load translations');
        const data = await response.json();
        this.state.allStrings = data.strings;
        this.organizeBySection();
      } catch (error) {
        this.showAlert('alert-error', 'Failed to load translations. Please refresh the page.');
        console.error('Error loading translations:', error);
      }
    },

    organizeBySection() {
      this.state.sections = {};
      this.state.allStrings.forEach((string) => {
        if (!this.state.sections[string.section]) {
          this.state.sections[string.section] = [];
        }
        this.state.sections[string.section].push(string);
      });
    },

    renderLanguageSelector() {
      const selector = document.getElementById('language-selector');
      selector.innerHTML = Object.entries(this.languages)
        .map(([code, name]) => {
          const untranslated = this.state.allStrings.filter((s) => !s[code]).length;
          const total = this.state.allStrings.length;
          const translated = total - untranslated;

          return `
            <button class="language-btn ${this.state.currentLanguage === code ? 'active' : ''}"
                    onclick="TranslationApp.selectLanguage('${code}')">
              ${name}
              <span class="count">${translated}/${total}</span>
            </button>
          `;
        })
        .join('');

      document.getElementById('total-count').textContent = this.state.allStrings.length;
    },

    selectLanguage(lang) {
      this.state.currentLanguage = lang;
      this.state.pendingTranslations = {};
      this.saveDraft();
      this.renderTranslations();
      this.updateLanguageButtons();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    renderTranslations() {
      const container = document.getElementById('translations-content');
      let html = '';

      Object.entries(this.state.sections).forEach(([section, strings]) => {
        html += `
          <div>
            <div class="section-header" onclick="TranslationApp.toggleSection(this)">
              <span class="toggle"></span>
              <span>${section}</span>
            </div>
            <div class="section-items show">
              ${strings
                .map(
                  (item) => `
                <div class="translation-row">
                  <div class="phrase-column">
                    <div class="phrase-text">${this.escapeHtml(item.en)}</div>
                    <div class="phrase-key">${item.key}</div>
                  </div>
                  <div class="context-column">
                    <span class="context-location">${item.section}</span>
                    <div class="context-description">${this.escapeHtml(item.context)}</div>
                  </div>
                  <div>
                    <input type="text"
                           class="translation-input ${this.state.pendingTranslations[item.key] ? 'completed' : ''}"
                           data-key="${item.key}"
                           placeholder="Enter translation"
                           value="${this.escapeHtml(this.state.pendingTranslations[item.key] || '')}"
                           onblur="TranslationApp.updateTranslation(this)">
                  </div>
                </div>
              `
                )
                .join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      this.updateProgress();
    },

    toggleSection(header) {
      header.classList.toggle('collapsed');
      const items = header.nextElementSibling;
      items.classList.toggle('show');
    },

    updateTranslation(input) {
      const key = input.getAttribute('data-key');
      const value = input.value.trim();

      if (value) {
        this.state.pendingTranslations[key] = value;
        input.classList.add('completed');
      } else {
        delete this.state.pendingTranslations[key];
        input.classList.remove('completed');
      }

      this.saveDraft();
      this.updateProgress();
      this.showAlert('alert-success', 'Draft saved automatically');
      setTimeout(() => document.getElementById('alert-success').classList.remove('show'), 2000);
    },

    updateProgress() {
      const translated = Object.keys(this.state.pendingTranslations).length;
      const total = this.state.allStrings.length;
      const percentage = total > 0 ? (translated / total) * 100 : 0;

      document.getElementById('translated-count').textContent = translated;
      document.getElementById('progress-percent').textContent = Math.round(percentage) + '%';
      document.getElementById('progress-bar').style.width = percentage + '%';
    },

    updateLanguageButtons() {
      document.querySelectorAll('.language-btn').forEach((btn) => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-lang="${this.state.currentLanguage}"]`)?.classList.add('active');
    },

    saveDraft() {
      localStorage.setItem(
        this.config.draftStorageKey,
        JSON.stringify({
          language: this.state.currentLanguage,
          translations: this.state.pendingTranslations,
          timestamp: Date.now(),
        })
      );
    },

    loadDraft() {
      const draft = localStorage.getItem(this.config.draftStorageKey);
      if (draft) {
        try {
          const data = JSON.parse(draft);
          this.state.currentLanguage = data.language;
          this.state.pendingTranslations = data.translations;
        } catch (error) {
          console.error('Error loading draft:', error);
        }
      }
    },

    async submitViaGitHub() {
      if (Object.keys(this.state.pendingTranslations).length === 0) {
        this.showAlert('alert-error', 'Please translate at least one string before submitting.');
        return;
      }

      const btn = document.getElementById('submit-github');
      btn.disabled = true;
      btn.textContent = '⏳ Authenticating...';

      try {
        const api = new GitHubAPI();
        const authData = await api.startAuthentication();
        await authData.promptUser();

        btn.textContent = '⏳ Creating PR...';

        const result = await api.createPullRequest(
          this.state.currentLanguage,
          this.state.pendingTranslations
        );

        this.showAlert(
          'alert-success',
          `✓ Pull request created! <a href="${result.prUrl}" target="_blank">View PR #${result.prNumber}</a>`
        );

        setTimeout(() => {
          localStorage.removeItem(this.config.draftStorageKey);
          window.location.reload();
        }, 3000);
      } catch (error) {
        this.showAlert('alert-error', `Error: ${error.message}`);
        btn.disabled = false;
        btn.textContent = '🔗 Create Pull Request';
      }
    },

    async submitAnonymous() {
      if (Object.keys(this.state.pendingTranslations).length === 0) {
        this.showAlert('alert-error', 'Please translate at least one string before submitting.');
        return;
      }

      const btn = document.getElementById('submit-anonymous');
      btn.disabled = true;
      btn.textContent = '⏳ Submitting...';

      try {
        const api = new GitHubAPI();
        const result = await api.createIssue(
          this.state.currentLanguage,
          this.state.pendingTranslations,
          {}
        );

        this.showAlert(
          'alert-success',
          `✓ Submission created! <a href="${result.issueUrl}" target="_blank">View Issue #${result.issueNumber}</a>`
        );

        setTimeout(() => {
          localStorage.removeItem(this.config.draftStorageKey);
          window.location.reload();
        }, 3000);
      } catch (error) {
        this.showAlert('alert-error', `Error: ${error.message}`);
        btn.disabled = false;
        btn.textContent = '📧 Submit via Issue';
      }
    },

    showAlert(type, message) {
      const alert = document.getElementById(type);
      alert.innerHTML = message;
      alert.classList.add('show');
    },

    escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      };
      return text.replace(/[&<>"']/g, (m) => map[m]);
    },

    attachEventListeners() {
      document.getElementById('submit-github').addEventListener('click', () => this.submitViaGitHub());
      document.getElementById('submit-anonymous').addEventListener('click', () => this.submitAnonymous());
    },
  };

  document.addEventListener('DOMContentLoaded', () => TranslationApp.init());
</script>
